#detail-panel {

// ─── RENDER ENGINE ───────────────────────────────────────────────────────────

const svg = document.getElementById('diagram');
const ns = 'http://www.w3.org/2000/svg';

function el(tag, attrs = {}, parent = null) {
  const e = document.createElementNS(ns, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}

function txt(content, attrs = {}, parent = null) {
  const t = el('text', attrs, parent);
  t.textContent = content;
  return t;
}

svg.setAttribute('width', SVG_W);
svg.setAttribute('height', SVG_H);

// Defs: arrow markers
const defs = el('defs', {}, svg);
const markerColors = { blue: '#3b82f6', green: '#34d399', amber: '#fbbf24', orange: '#fb923c', indigo: '#818cf8', slate: '#94a3b8', grey: '#64748b', dark: '#334155', pink: '#f43f5e' };

function mkColor(hex) {
  // map arrow color to nearest marker id
  const map = {
    '#3b82f6': 'blue', '#34d399': 'green', '#fbbf24': 'amber', '#fb923c': 'orange',
    '#818cf8': 'indigo', '#94a3b8': 'slate', '#64748b': 'grey', '#334155': 'dark', '#f43f5e': 'pink'
  };
  return map[hex] || 'slate';
}

for (const [name, color] of Object.entries(markerColors)) {
  const m = el('marker', { id: `ah-${name}`, markerWidth: '7', markerHeight: '7', refX: '5', refY: '3.5', orient: 'auto' }, defs);
  el('polygon', { points: '0,0 7,3.5 0,7', fill: color }, m);
}

// Lane backgrounds
const stateBandBg = el('g', {}, svg);
el('rect', { x: 0, y: STATE_Y - 18, width: SVG_W, height: STATE_H + 30, rx: 4, fill: 'rgba(15,23,42,0.9)', stroke: '#1e293b', 'stroke-width': 1 }, stateBandBg);
txt('State & Persistence', { x: SVG_W / 2, y: STATE_Y - 4, fill: '#475569', 'font-size': 10, 'font-weight': 700, 'text-anchor': 'middle', 'letter-spacing': '0.08em', 'font-family': 'Segoe UI, system-ui, sans-serif' }, stateBandBg);

for (const lane of lanes) {
  const g = el('g', {}, svg);
  el('rect', { x: lane.x, y: LANE_Y_START, width: lane.w, height: CONTENT_HEIGHT, rx: 4, fill: lane.bg, stroke: lane.border, 'stroke-width': 1 }, g);
  // lane header
  el('rect', { x: lane.x, y: LANE_Y_START, width: lane.w, height: 44, rx: 4, fill: `${lane.hc}22`, stroke: 'none' }, g);
  txt(lane.label, { x: lane.x + lane.w / 2, y: LANE_Y_START + 17, fill: '#e2e8f0', 'font-size': 11, 'font-weight': 700, 'text-anchor': 'middle', 'font-family': 'Segoe UI, system-ui, sans-serif' }, g);
  txt(lane.sub, { x: lane.x + lane.w / 2, y: LANE_Y_START + 32, fill: '#64748b', 'font-size': 9, 'text-anchor': 'middle', 'font-family': 'Segoe UI, system-ui, sans-serif' }, g);
}

// Node map for arrow lookup
const nodeMap = {};
for (const n of nodes) nodeMap[n.id] = n;

// Lane color map
const laneColor = { world: '#1d4ed8', orch: '#4338ca', signal: '#047857', decision: '#92400e', execution: '#9a3412', state: '#334155' };
const laneFill   = { world: 'rgba(29,78,216,0.18)', orch: 'rgba(67,56,202,0.18)', signal: 'rgba(4,120,87,0.18)', decision: 'rgba(146,64,14,0.18)', execution: 'rgba(154,52,18,0.18)', state: 'rgba(51,65,85,0.25)' };

// Render arrows (behind nodes)
const arrowLayer = el('g', { id: 'arrow-layer' }, svg);

function cx(n) { return n.x + n.w / 2; }
function cy(n) { return n.y + n.h / 2; }
function right(n) { return { x: n.x + n.w, y: cy(n) }; }
function left(n)  { return { x: n.x,       y: cy(n) }; }
function top(n)   { return { x: cx(n),     y: n.y };    }
function bot(n)   { return { x: cx(n),     y: n.y + n.h }; }

function bestPoints(src, dst) {
  const sx = cx(src), sy = cy(src);
  const dx = cx(dst), dy = cy(dst);
  const diffX = dx - sx, diffY = dy - sy;

  // Primarily vertical?
  if (Math.abs(diffY) > Math.abs(diffX) * 0.8) {
    if (diffY > 0) return { s: bot(src), d: top(dst) };
    else           return { s: top(src), d: bot(dst) };
  }
  // Primarily horizontal
  if (diffX > 0) return { s: right(src), d: left(dst) };
  else           return { s: left(src),  d: right(dst) };
}

function drawArrow(a) {
  const src = nodeMap[a.from];
  const dst = nodeMap[a.to];
  if (!src || !dst) return;

  const { s, d } = bestPoints(src, dst);
  const mId = mkColor(a.color);

  // Compute bezier CPs
  const dx = d.x - s.x, dy = d.y - s.y;
  let cp1x, cp1y, cp2x, cp2y;

  if (Math.abs(dy) > Math.abs(dx) * 0.8) {
    // Vertical bezier: curve gently
    cp1x = s.x; cp1y = s.y + dy * 0.45;
    cp2x = d.x; cp2y = d.y - dy * 0.45;
  } else {
    // Horizontal bezier: curve gently
    cp1x = s.x + dx * 0.45; cp1y = s.y;
    cp2x = d.x - dx * 0.45; cp2y = d.y;
  }

  const path = el('path', {
    d: `M${s.x},${s.y} C${cp1x},${cp1y} ${cp2x},${cp2y} ${d.x},${d.y}`,
    fill: 'none',
    stroke: a.color,
    'stroke-width': a.dashed ? 1.2 : 1.5,
    'stroke-dasharray': a.dashed ? '5,3' : 'none',
    'marker-end': `url(#ah-${mId})`,
    opacity: 0.75
  }, arrowLayer);

  // Optional edge label
  if (a.label) {
    const lx = (s.x + d.x) / 2;
    const ly = (s.y + d.y) / 2;
    const bg = el('rect', { x: lx - 18, y: ly - 7, width: 36, height: 13, rx: 3, fill: '#0a0e1a', opacity: 0.85 }, arrowLayer);
    txt(a.label, {
      x: lx, y: ly + 4,
      fill: a.color, 'font-size': 8, 'text-anchor': 'middle', opacity: 0.9,
      'font-family': 'Consolas, Courier New, monospace'
    }, arrowLayer);
  }
}

for (const a of arrows) drawArrow(a);

// Render nodes (on top of arrows)
const nodeLayer = el('g', { id: 'node-layer' }, svg);
const panel = document.getElementById('detail-panel');

function showDetail(n) {
  const lc = n.layerColor || '#334155';
  panel.innerHTML = `
    <span class="dp-layer-tag" style="background:${lc}22;color:${lc};border:1px solid ${lc}44">${n.layerTag}</span>
    <div class="dp-title">${n.label}</div>
    <div class="dp-file">${n.sub}</div>
    <div class="dp-desc">${n.desc}</div>
    ${n.bullets ? `<ul class="dp-bullets">${n.bullets.map(b => `<li>${b}</li>`).join('')}</ul>` : ''}
    ${(n.input || n.output) ? `
      <hr class="dp-divider">
      ${n.input ? `<div class="dp-io-label">Input</div><div class="dp-io-val">${n.input}</div>` : ''}
      ${n.output ? `<div class="dp-io-label" style="margin-top:8px">Output</div><div class="dp-io-val">${n.output}</div>` : ''}
    ` : ''}
  `;
}

for (const n of nodes) {
  const g = el('g', { class: 'node-group', role: 'button', tabindex: '0' }, nodeLayer);
  g.addEventListener('click', () => showDetail(n));
  g.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') showDetail(n); });

  const lc = laneColor[n.lane] || '#334155';
  const lf = laneFill[n.lane]  || 'rgba(51,65,85,0.25)';

  // Shadow
  el('rect', {
    x: n.x + 2, y: n.y + 2, width: n.w, height: n.h, rx: 5,
    fill: 'rgba(0,0,0,0.35)', stroke: 'none'
  }, g);

  // Main rect
  el('rect', {
    class: 'node-rect',
    x: n.x, y: n.y, width: n.w, height: n.h, rx: 5,
    fill: lf,
    stroke: lc,
    'stroke-width': n.external ? 1 : 1.5,
    'stroke-dasharray': n.external ? '4,2' : 'none'
  }, g);

  // Accent bar (left edge)
  if (!n.external) {
    el('rect', { x: n.x, y: n.y + 4, width: 3, height: n.h - 8, rx: 1.5, fill: lc, opacity: 0.8 }, g);
  }

  // Label text (main)
  const labelLines = n.label.length > 28 ? [n.label.substring(0, 28), n.label.substring(28)] : [n.label];
  const labelY = n.h > 50
    ? n.y + 16
    : (labelLines.length > 1 ? n.y + 13 : n.y + n.h / 2 - 4);

  for (let i = 0; i < labelLines.length; i++) {
    txt(labelLines[i], {
      x: n.x + 12, y: labelY + i * 13,
      fill: '#f1f5f9', 'font-size': 11, 'font-weight': 600,
      'font-family': 'Segoe UI, system-ui, sans-serif'
    }, g);
  }

  // Sub text (file path / description)
  if (n.sub) {
    const subY = n.h > 50
      ? n.y + n.h - (n.bullets && n.bullets.length > 4 ? 38 : 28)
      : n.y + n.h - 9;

    // Truncate sub if too long
    const maxSubLen = Math.floor((n.w - 18) / 5.8);
    const subText = n.sub.length > maxSubLen ? n.sub.substring(0, maxSubLen - 1) + '…' : n.sub;

    txt(subText, {
      x: n.x + 12, y: subY,
      fill: '#475569', 'font-size': 9,
      'font-family': 'Consolas, Courier New, monospace'
    }, g);
  }

  // Tall node: show key bullet points as mini-text
  if (n.h > 60 && n.bullets) {
    const maxBullets = Math.floor((n.h - 40) / 13);
    const bulletsToShow = n.bullets.slice(0, Math.min(maxBullets, 5));
    bulletsToShow.forEach((b, i) => {
      const bText = b.length > 36 ? b.substring(0, 35) + '…' : b;
      const bY = n.y + 30 + i * 13;
      txt('· ' + bText, {
        x: n.x + 12, y: bY,
        fill: '#64748b', 'font-size': 9,
        'font-family': 'Segoe UI, system-ui, sans-serif'
      }, g);
    });
  }
}
